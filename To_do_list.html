<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Just Do It</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e2937; }
    [data-theme="dark"] { --bg: #0f172a; --card: #1e2937; --text: #f1f5f9; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); }
    .landing { min-height:100vh; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; color:white; text-align:center; }
    .landing h1 { font-size:5.5rem; font-weight:900; }
    .cta-button { background:white; color:#4f46e5; padding:18px 50px; font-size:1.3rem; font-weight:700; border:none; border-radius:50px; cursor:pointer; margin-top:20px; }
    
    .app { display:none; min-height:100vh; }
    .header { background:var(--card); padding:1rem 5%; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    .logo { font-size:2.2rem; font-weight:800; color:var(--primary); }
    
    .main-container { display:flex; max-width:1200px; margin:30px auto; padding:0 5%; gap:20px; }
    .sidebar, .todo-container { background:var(--card); border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    .sidebar { width:280px; }
    .todo-container { flex:1; }
    
    .add-task { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .add-task input, .add-task select, .add-task button { padding:14px; border-radius:12px; border:2px solid #ddd; }
    .add-task input { flex:1; min-width:250px; }
    .add-task button { background:var(--primary); color:white; border:none; font-weight:600; cursor:pointer; }
    
    .ai-btn { background:#10b981; color:white; border:none; padding:14px 20px; border-radius:12px; cursor:pointer; font-weight:600; margin:10px 0; width:100%; }
    
    .task-item { background:var(--bg); padding:16px; border-radius:14px; margin-bottom:12px; display:flex; align-items:center; gap:12px; }
  </style>
</head>
<body>

  <!-- Landing -->
  <div id="landing" class="landing">
    <div>
      <h1>Just Do It</h1>
      <p style="font-size:1.5rem; margin:20px 0;">Now with Grok AI</p>
      <button class="cta-button" onclick="showLoginModal()">Start Now</button>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:20px; width:350px; text-align:center;">
      <h2>Login</h2>
      <input id="login-email" value="demo@user.com" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;" placeholder="Email"><br>
      <input id="login-pass" value="123456" type="password" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc;" placeholder="Password"><br>
      <button onclick="login()" style="width:100%; padding:12px; background:#6366f1; color:white; border:none; border-radius:10px; margin:10px 0;">Login</button>
      <button onclick="guestLogin()" style="width:100%; padding:12px; background:#666; color:white; border:none; border-radius:10px;">Guest Login</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app">
    <div class="header">
      <div class="logo">Just Do It</div>
      <div>
        <span id="user-greeting">Hi, User</span> |
        <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
      </div>
    </div>

    <div class="main-container">
      <div class="sidebar">
        <h2>My Progress</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:20px 0;">
          <div style="text-align:center;"><div id="total-tasks" style="font-size:2rem; font-weight:bold;">0</div>Total</div>
          <div style="text-align:center;"><div id="completed-tasks" style="font-size:2rem; font-weight:bold;">0</div>Done</div>
          <div style="text-align:center;"><div id="pending-tasks" style="font-size:2rem; font-weight:bold;">0</div>Pending</div>
        </div>
      </div>

      <div class="todo-container">
        <h2>Add Task</h2>
        <div class="add-task">
          <input type="text" id="task-input" placeholder="What needs to be done?">
          <button onclick="addTask()">Add</button>
        </div>

        <button class="ai-btn" onclick="showAIPromptModal()">🤖 Ask Grok AI</button>

        <h2>Your Tasks</h2>
        <ul id="task-list" style="list-style:none;"></ul>
      </div>
    </div>
  </div>

  <!-- Grok AI Modal -->
  <div id="ai-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:20px; width:480px;">
      <h2>🤖 Ask Grok AI</h2>
      <p style="margin:10px 0;">What do you need help with?</p>
      
      <select id="ai-quick" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px;">
        <option value="">Choose...</option>
        <option value="Suggest 5 good tasks for today">Suggest 5 tasks for today</option>
        <option value="Give me motivation to work">Give me motivation</option>
        <option value="How to be more productive">How to be more productive</option>
      </select>

      <textarea id="ai-prompt" rows="3" placeholder="Or type your own question..." style="width:100%; padding:12px; border-radius:10px;"></textarea>

      <div style="margin-top:15px; display:flex; gap:10px;">
        <button onclick="hideAIModal()" style="flex:1; padding:12px; background:#888; color:white; border:none; border-radius:10px;">Cancel</button>
        <button onclick="callGrok()" style="flex:1; padding:12px; background:black; color:white; border:none; border-radius:10px;">Ask Grok</button>
      </div>

      <div id="ai-loading" style="display:none; margin-top:15px; text-align:center;">Grok is thinking...</div>
      <div id="ai-result" style="margin-top:15px; padding:15px; background:#f8f9fa; border-radius:10px; display:none;"></div>
    </div>
  </div>

  <script>
    let tasks = [];
    let currentUser = null;
    let grokKey = localStorage.getItem('grokKey') || '';

    function login() {
      currentUser = "Demo User";
      document.getElementById('login-modal').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-greeting').textContent = "Hi, Demo User";
      renderTasks();
    }

    function guestLogin() {
      currentUser = "Guest";
      document.getElementById('login-modal').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-greeting').textContent = "Hi, Guest";
      renderTasks();
    }

    function logout() { location.reload(); }

    function showLoginModal() {
      document.getElementById('login-modal').style.display = 'flex';
    }

    function addTask() {
      const input = document.getElementById('task-input');
      if (!input.value.trim()) return;
      tasks.unshift({ title: input.value.trim(), completed: false });
      input.value = '';
      renderTasks();
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      list.innerHTML = '';
      tasks.forEach((task, i) => {
        const item = document.createElement('li');
        item.className = 'task-item';
        item.innerHTML = `
          <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${i})">
          <span style="${task.completed ? 'text-decoration:line-through; opacity:0.6' : ''}">${task.title}</span>
          <button onclick="deleteTask(${i})" style="margin-left:auto; background:none; border:none; color:red; cursor:pointer;">🗑️</button>
        `;
        list.appendChild(item);
      });
    }

    function toggleComplete(i) {
      tasks[i].completed = !tasks[i].completed;
      renderTasks();
    }

    function deleteTask(i) {
      tasks.splice(i, 1);
      renderTasks();
    }

    // ==================== GROK AI ====================
    async function callGrok() {
      let prompt = document.getElementById('ai-prompt').value.trim();
      if (!prompt) prompt = document.getElementById('ai-quick').value;
      if (!prompt) return alert("Please type or select a question");

      if (!grokKey) {
        grokKey = prompt("Paste your Grok API Key here:\n\n(Go to https://console.x.ai/ to get it)");
        if (grokKey) localStorage.setItem('grokKey', grokKey);
        else return;
      }

      document.getElementById('ai-loading').style.display = 'block';
      document.getElementById('ai-result').style.display = 'none';

      try {
        const res = await fetch('https://api.x.ai/v1/chat/completions', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${grokKey}`
          },
          body: JSON.stringify({
            model: "grok-4.20-non-reasoning",
            messages: [{ role: "user", content: prompt }]
          })
        });

        const data = await res.json();
        const answer = data.choices[0].message.content;

        document.getElementById('ai-result').innerHTML = `<strong>Grok:</strong><br><br>${answer.replace(/\n/g, '<br>')}`;
        document.getElementById('ai-result').style.display = 'block';
      } catch(e) {
        alert("Error: " + e.message + "\n\nMake sure your Grok API key is correct.");
      }

      document.getElementById('ai-loading').style.display = 'none';
    }

    function showAIPromptModal() {
      document.getElementById('ai-modal').style.display = 'flex';
    }

    function hideAIModal() {
      document.getElementById('ai-modal').style.display = 'none';
    }
  </script>
</body>
</html>
